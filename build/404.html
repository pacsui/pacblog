  <style>
  :root {
    --width: 720px;
    --font-main: Verdana, sans-serif;
    --font-secondary: Verdana, sans-serif;
    --font-scale: 1em;
    --background-color: #0b1b12;  
    --heading-color: #F5EFDC;  
    --text-color: #dcd3c6;  
    --link-color: #8FB38A;  
    --visited-color: #b39cd0;  
    --blockquote-color: #cdbfae;

    --palm-leaf: #121e18;    
    --deep-mocha: #f8f2f6;   
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: var(--text-color);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
    transform: scaleX(1.15) skewX(-5deg);
    transform-origin: left;
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  nav a {
    margin-right: 8px;
  }

  strong,
  b {
    color: var(--heading-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  main {
    line-height: 1.6;
  }

  table {
    width: 100%;
  }

  hr {
    border: 0;
    border-top: 1px dashed;
  }

  img {
    max-width: 100%;
  }

  blockquote img {
    display: block;
    margin: 1em auto;
  }

  code {
    font-family: monospace;
    padding: 2px;
    border-radius: 3px;
    background-color: var(--palm-leaf);
    color: var(--deep-mocha);
  }

  pre {
    background-color: var(--palm-leaf) !important;  
    color: var(--deep-mocha);
    padding: 1em;
    border-radius: 3px;
    overflow-x: auto;
    line-height: 1.4;
  }

  blockquote {
    border-left: 1px solid var(--blockquote-color);
    color: var(--blockquote-color);
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    padding: 25px 0;
    text-align: center;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .inline {
    width: auto !important;
  }

  .highlight {
    background-color: var(--palm-leaf);
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
  }

  .highlight pre {
    margin: 0;
    padding: 1em;
  }

  code {
    font-family: monospace;
    padding: 2px 4px;
    border-radius: 3px;
    background-color: var(--palm-leaf);
    color: var(--deep-mocha);
  }

   
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

    display: flex;
  }
